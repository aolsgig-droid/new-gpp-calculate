<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPP Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    margin-bottom:30px;
}

.row{
    display:flex;
    gap:15px;
}

.input-box{
    flex:1;
}

label{
    display:block;
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

input{
    width:100%;
    height:60px;
    font-size:30px;
    text-align:center;
    border-radius:12px;
    border:none;
    font-weight:bold;
}

.result{
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:34px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="title">
GPP CALCULATOR
</div>

<div class="row">

<div class="input-box">
<label>LBS</label>
<input type="number" id="lbs" value="0">
</div>

<div class="input-box">
<label>GPP</label>
<input type="number" id="gpp" value="0">
</div>

</div>

<div class="result" id="arrow">
Arrow: 0 gram
</div>

<div class="result" id="spine">
Spine:
</div>

</div>

<script>

const lbsInput = document.getElementById("lbs");
const gppInput = document.getElementById("gpp");

function calculate(){

    const lbs = Number(lbsInput.value);
    const gpp = Number(gppInput.value);

    const arrow = Math.round(lbs * gpp * 0.0647989);

    let spine = "";

    if (lbs >= 30 && lbs <= 35){
        spine = 600;
    }
    else if (lbs >= 36 && lbs <= 39){
        spine = 550;
    }
    else if (lbs >= 40 && lbs <= 45){
        spine = 500;
    }
    else if (lbs >= 46 && lbs <= 49){
        spine = 450;
    }
    else if (lbs >= 50 && lbs <= 55){
        spine = 400;
    }
    else if (lbs >= 56 && lbs <= 59){
        spine = 350;
    }
    else if (lbs >= 60 && lbs <= 65){
        spine = 300;
    }
    else if (lbs >= 66 && lbs <= 69){
        spine = 250;
    }
    else if (lbs >= 70 && lbs <= 100){
        spine = 200;
    }

    document.getElementById("arrow").innerHTML =
        `Arrow: ${arrow.toLocaleString()} gram`;

    document.getElementById("spine").innerHTML =
        `Spine: ${spine}`;
}

lbsInput.addEventListener("input", calculate);
gppInput.addEventListener("input", calculate);

calculate();

</script>

</body>
</html>
